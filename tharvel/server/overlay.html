<style>
  /* Stili overlay Tharvel: pointer di selezione iniettato al volo nei siti senza script proprio. */
  .tharvel-hover { outline: 2px dashed #10b981 !important; outline-offset: 2px !important; cursor: crosshair !important; position: relative; z-index: 9999; }
  .tharvel-highlight { outline: 3px solid #10b981 !important; outline-offset: 2px !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4) !important; position: relative; z-index: 9999; }
</style>
<script>
  // Rewrite path assoluti per asset renderizzati DOPO il page load.
  // Servizio: siti Vite/SPA renderizzano <img src="/logo.png"> via JS/React →
  // browser cerca <host>/logo.png fuori dal namespace /tharveladmin/site/<slug>/
  // → 404 (cade nello SPA fallback Tharvel UI). Il rewrite HTML server-side
  // tocca solo l'HTML statico che torniamo; gli attributi creati a runtime li
  // sistemiamo qui via MutationObserver.
  (function () {
    if (window.__tharvelAssetRewriteInstalled) return;
    window.__tharvelAssetRewriteInstalled = true;

    // Il prefix viene dal path della pagina, es. "/tharveladmin/site/twobee".
    const match = location.pathname.match(/^(\/[^/]+\/site\/[^/]+)/);
    if (!match) return; // non sotto namespace Tharvel, niente da fare
    const PREFIX = match[1];

    const needsRewrite = (v) => {
      if (!v) return false;
      // Solo root-relative; preserve URL assolute, protocol-relative, fragmenti, data:, blob:
      if (!v.startsWith('/')) return false;
      if (v.startsWith('//')) return false;
      if (v.startsWith(PREFIX + '/') || v === PREFIX) return false;
      return true;
    };

    const rewriteAttr = (el, attr) => {
      const v = el.getAttribute && el.getAttribute(attr);
      if (needsRewrite(v)) el.setAttribute(attr, PREFIX + v);
    };

    const rewriteSrcset = (el) => {
      const v = el.getAttribute && el.getAttribute('srcset');
      if (!v) return;
      const out = v.split(',').map(part => {
        const p = part.trim();
        const [u, ...rest] = p.split(/\s+/);
        return needsRewrite(u) ? [PREFIX + u, ...rest].join(' ') : p;
      }).join(', ');
      if (out !== v) el.setAttribute('srcset', out);
    };

    const SELECTORS = 'img[src],source[src],video[src],audio[src],script[src],link[href],a[href],iframe[src]';
    const SRCSET_SELECTORS = 'img[srcset],source[srcset]';

    const rewriteIn = (root) => {
      if (!root || !root.querySelectorAll) return;
      root.querySelectorAll(SELECTORS).forEach(el => {
        rewriteAttr(el, el.tagName === 'LINK' || el.tagName === 'A' ? 'href' : 'src');
      });
      root.querySelectorAll(SRCSET_SELECTORS).forEach(rewriteSrcset);
    };

    // Prima passata immediata + dopo DOMContentLoaded (per asset già in HTML).
    rewriteIn(document.documentElement);
    document.addEventListener('DOMContentLoaded', () => rewriteIn(document.documentElement));

    // Continuous: ogni nodo aggiunto dopo (es. React mount).
    new MutationObserver(muts => {
      for (const m of muts) {
        for (const n of m.addedNodes) {
          if (n.nodeType !== 1) continue;
          rewriteAttr(n, 'src');
          rewriteAttr(n, 'href');
          if (n.hasAttribute && n.hasAttribute('srcset')) rewriteSrcset(n);
          rewriteIn(n);
        }
        // Anche cambi di attributo (React aggiorna img.src dinamicamente)
        if (m.type === 'attributes' && m.target && m.target.nodeType === 1) {
          const a = m.attributeName;
          if (a === 'src' || a === 'href') rewriteAttr(m.target, a);
          else if (a === 'srcset') rewriteSrcset(m.target);
        }
      }
    }).observe(document.documentElement, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['src', 'href', 'srcset'],
    });
  })();

  // Logica MCP Pointer nativa: hover su Alt + click per selezionare un elemento e
  // notificare il widget parent via postMessage(THARVEL_ELEMENT_SELECTED).
  // Iniettato dal server Tharvel nei siti che non includono già lo snippet (es. build Astro).
  (function () {
    if (window.__tharvelOverlayInstalled) return;
    window.__tharvelOverlayInstalled = true;

    let currentHighlight = null;
    let isAltPressed = false;

    function getXPath(element) {
      if (element.id !== '') return 'id("' + element.id + '")';
      if (element === document.body) return element.tagName;
      var ix = 0;
      var siblings = element.parentNode.childNodes;
      for (var i = 0; i < siblings.length; i++) {
        var sibling = siblings[i];
        if (sibling === element) return getXPath(element.parentNode) + '/' + element.tagName + '[' + (ix + 1) + ']';
        if (sibling.nodeType === 1 && sibling.tagName === element.tagName) ix++;
      }
    }

    document.addEventListener('keydown', (e) => { if (e.altKey) isAltPressed = true; });
    document.addEventListener('keyup', (e) => {
      if (!e.altKey) {
        isAltPressed = false;
        document.querySelectorAll('.tharvel-hover').forEach(el => el.classList.remove('tharvel-hover'));
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (isAltPressed) {
        document.querySelectorAll('.tharvel-hover').forEach(el => el.classList.remove('tharvel-hover'));
        if (e.target && e.target !== document.body && e.target !== document.documentElement) {
          e.target.classList.add('tharvel-hover');
        }
      }
    });

    document.addEventListener('click', (e) => {
      if (e.altKey) {
        e.preventDefault();
        e.stopPropagation();

        if (currentHighlight) currentHighlight.classList.remove('tharvel-highlight');
        currentHighlight = e.target;
        currentHighlight.classList.add('tharvel-highlight');
        currentHighlight.classList.remove('tharvel-hover');

        const info = {
          tag: currentHighlight.tagName.toLowerCase(),
          id: currentHighlight.id,
          classes: Array.from(currentHighlight.classList).filter(c => !c.startsWith('tharvel-')).join(' '),
          text: currentHighlight.innerText.substring(0, 150).trim(),
          xpath: getXPath(currentHighlight)
        };

        window.parent.postMessage({ type: 'THARVEL_ELEMENT_SELECTED', info }, '*');
      }
    }, true);
  })();
</script>
